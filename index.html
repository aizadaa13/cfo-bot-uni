<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CFO Bot</title>
</head>
<body>
  <h1>CFO Bot - Cloud Cost Calculator</h1>
  
  <label>Instances: <input type="number" id="instances" value="0"></label><br>
  <label>Storage (GB): <input type="number" id="storage" value="0"></label><br>
  <label>Visitors: <input type="number" id="visitors" value="0"></label><br>
  <label>DB Storage (GB): <input type="number" id="db" value="0"></label><br>
  
  <button onclick="calculate()">Calculate</button>
  
  <h2>Results:</h2>
  <pre id="results"></pre>

  <script>
    function calculate() {
      const H = 730;         // hours per month
      const r = 0.05;        // compute per hour
      const Ps = 0.08;       // storage per GB
      const Pe = 0.09;       // network per GB
      const Idb = 0.03;      // DB instance per hour
      const Pdb = 0.10;      // DB storage per GB
      const free_egress = 5; // GB free tier

      // Берём значения из полей
      let n = Number(document.getElementById('instances').value);
      let S = Number(document.getElementById('storage').value);
      let visitors = Number(document.getElementById('visitors').value);
      let Sdb = Number(document.getElementById('db').value);

      // Считаем egress из посетителей
      let E = visitors * 2 / 1024; // GB
      E = Math.max(0, E - free_egress);

      // Считаем компоненты
      let compute_cost = n * r * H;
      let storage_cost = S * Ps;
      let network_cost = E * Pe;
      let db_cost = Idb * H + Sdb * Pdb;
      let total_cost = compute_cost + storage_cost + network_cost + db_cost;

      // Выводим результат
      document.getElementById('results').textContent =
        `Compute Cost: $${compute_cost.toFixed(2)}\n` +
        `Storage Cost: $${storage_cost.toFixed(2)}\n` +
        `Network Cost: $${network_cost.toFixed(2)}\n` +
        `Database Cost: $${db_cost.toFixed(2)}\n` +
        `Total Cost: $${total_cost.toFixed(2)}`;
    }
  </script>
</body>
</html>
